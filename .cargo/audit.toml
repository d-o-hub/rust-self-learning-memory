# cargo-audit configuration
# https://rustsec.org/

[advisories]
# Ignored advisories for transitive dependency security issues
# These are tracked but awaiting upstream updates
ignore = [
    # RUSTSEC-2025-0134: rustls-pemfile 2.2.0 is unmaintained
    # Dependency chain: libsql 0.9.30 -> hyper-rustls 0.25.0 -> rustls-native-certs 0.7.3 -> rustls-pemfile 2.2.0
    # Solution: Awaiting libsql update to use hyper-rustls 0.27.7 (which uses rustls-native-certs 0.8.3 without rustls-pemfile)
    # Mitigation: rustls-pemfile is PEM parsing only, no known exploits at this time
    "RUSTSEC-2025-0134",

    # RUSTSEC-2026-0049: rustls-webpki CRL matching logic flaw
    # Dependency chain: libsql 0.9.30 -> hyper-rustls 0.25 -> rustls 0.22 -> rustls-webpki 0.102.8
    # Fix: rustls-webpki >=0.103.10 (semver-incompatible with rustls 0.22's ^0.102.8 constraint)
    # Upstream: Requires libsql to migrate from hyper-rustls 0.25 (hyper 0.14) to 0.27 (hyper 1.x)
    # Tracking: https://github.com/rustls/webpki/releases/tag/v/0.103.10
    # Mitigation: CRL matching flaw is low impact; CRL validation not relied upon in our usage
    "RUSTSEC-2026-0049",

    # RUSTSEC-2026-0099: rustls-webpki name constraints for wildcard names incorrectly accepted
    # Dependency chain: libsql 0.9.30 -> hyper-rustls 0.25 -> rustls 0.22 -> rustls-webpki 0.102.8
    # Fix: rustls-webpki >=0.103.12 OR >=0.104.0-alpha.6 (semver-incompatible)
    # Date: 2026-04-14
    # Mitigation: Transitive dependency, awaiting libsql upstream update
    "RUSTSEC-2026-0099",

    # RUSTSEC-2026-0098: rustls-webpki name constraints for URI names incorrectly accepted
    # Same dependency chain and fix as RUSTSEC-2026-0099
    # Date: 2026-04-14
    "RUSTSEC-2026-0098",

    # RUSTSEC-2026-0002: lru has unsound IterMut implementation
    # Dependency chain: augurs-changepoint 0.10.2 -> changepoint 0.14.2 -> rv 0.16.5 -> lru 0.9.0
    # Solution: Awaiting augurs updates to use latest changepoint/rv versions
    # Mitigation: IterMut unsoundness only affects specific edge cases, not used in our code paths
    "RUSTSEC-2026-0002",

    # RUSTSEC-2026-0097: rand is unsound with a custom logger using rand::rng()
    # Dependency chain: multiple (tokio, libsql, etc) -> rand 0.8/0.9
    # Fix: rand >=0.8.6 (semver-compatible with 0.8.x) or >=0.9.x
    # Upstream: Waiting for transitive dependency updates
    # Mitigation: Unsoundness only affects custom loggers using rand::rng()
    "RUSTSEC-2026-0097",

    # RUSTSEC-2025-0141: bincode is unmaintained
    # Dependency chain: libsql 0.9.30 -> bincode 1.3.3
    # Mitigation: Awaiting libsql update, bincode usage in libsql is for internal state
    "RUSTSEC-2025-0141",

    # RUSTSEC-2024-0384: instant is unmaintained
    # Dependency chain: augurs-changepoint 0.10.2 -> ... -> instant 0.1.13
    # Mitigation: Awaiting augurs updates
    "RUSTSEC-2024-0384",

    # RUSTSEC-2024-0436: paste is unmaintained
    # Dependency chain: tokenizers 0.22.2 -> paste 1.0.15
    # Mitigation: Awaiting tokenizers updates
    "RUSTSEC-2024-0436",
]
