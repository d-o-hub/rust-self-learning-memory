coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 1%
    patch:
      default:
        target: 70%
        threshold: 2%

ignore:
  - "benches/**"
  - "examples/**"
  - "test-utils/**"
  - "docs/**"
  - "plans/**"
  - "agent_docs/**"
  - ".agents/**"
  - ".github/**"
  - "scripts/**"
