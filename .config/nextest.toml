[profile.default]
retries = 0
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = false

[profile.ci]
retries = 2
slow-timeout = { period = "60s", terminate-after = 3 }
failure-output = "immediate-final"

[profile.ci.junit]
path = "target/nextest/ci/junit.xml"
store-success-output = false
store-failure-output = true

[profile.nightly]
retries = 1
slow-timeout = { period = "120s", terminate-after = 2 }
failure-output = "final"
status-level = "skip"

# CLI integration tests that spawn cargo run need longer timeouts
[[profile.default.overrides]]
filter = "package(do-memory-cli) and test(update)"
slow-timeout = { period = "180s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = "package(do-memory-cli) and test(update)"
slow-timeout = { period = "180s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = "package(e2e-tests) and test(quality_gate_performance_regression)"
slow-timeout = { period = "180s", terminate-after = 2 }
