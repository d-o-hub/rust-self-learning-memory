---
name: Performance Benchmarks

"on":
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'plans/**'
      - '**/*.md'
      - '.agents/**'
      - 'agent_docs/**'
  pull_request:
    branches:
      - main
    paths:
      - 'memory-core/src/**/*.rs'
      - 'memory-storage-turso/src/**/*.rs'
      - 'memory-storage-redb/src/**/*.rs'
      - 'memory-mcp/src/**/*.rs'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/benchmarks.yml'
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  check-quick-check:
    name: Check Quick Check Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    # Must exceed Quick Check (25m) + queue headroom.
    timeout-minutes: 40
    steps:
      - name: Wait for Quick Check with timeout protection
        uses: lewagon/wait-on-check-action@1d57e2c51a58d812d2765e036a028b6bdb5a6154
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Quick PR Check (Format + Clippy)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          running-workflow-name: Quick Check
          fail-on-no-checks: false
          allowed-conclusions: success,skipped,cancelled

  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        !contains(github.event.pull_request.labels.*.name, 'skip-benchmarks') &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    permissions:
      contents: read
      actions: write
    timeout-minutes: 70
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_CACHE_SIZE: 2G
      SCCACHE_DIRECT: true
      JAVY_PLUGIN: "${{ github.workspace }}/do-memory-mcp/javy-plugin.wasm"

    steps:
      - name: Set build directories
        shell: bash
        run: |
          echo "CARGO_TARGET_DIR=${{ runner.temp }}/cargo-target" >> $GITHUB_ENV
          echo "SCCACHE_DIR=${{ runner.temp }}/sccache" >> $GITHUB_ENV

      - name: Check disk space with minimum threshold
        run: |
          echo "=== Disk Space Check ==="
          df -h
          AVAILABLE_GB=$(df -BG / | awk 'NR==2 {print $4}' | sed 's/G//')
          MIN_REQUIRED_GB=10
          echo "Available: ${AVAILABLE_GB}GB, Required: ${MIN_REQUIRED_GB}GB"
          if [ "$AVAILABLE_GB" -lt "$MIN_REQUIRED_GB" ]; then
            echo "❌ ERROR: Insufficient disk space. Have ${AVAILABLE_GB}GB, need ${MIN_REQUIRED_GB}GB"
            exit 1
          fi
          echo "✅ Sufficient disk space available"

      - name: Free disk space (benchmark cleanup)
        if: runner.os == 'Linux'
        run: |
          echo "=== Freeing Disk Space ==="
          sudo rm -f /swapfile || true
          sudo apt-get clean || true
          docker system prune -af || true
          echo "=== Disk Space After Cleanup ==="
          df -h

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: benchmarks
          save-cache: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
          components: rustfmt, clippy

      - name: Install sccache
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b
        with:
          tool: sccache

      - name: Cache sccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ runner.temp }}/sccache
          key: ${{ runner.os }}-bench-sccache-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-bench-sccache-

      - name: Run benchmarks with comprehensive timeout protection
        timeout-minutes: 55
        run: |
           echo "=== Starting Benchmark Suite ==="
           echo "Start time: $(date)"
           START_TIME=$(date +%s)
           MAX_TOTAL_TIME=3000

           mapfile -t bench_names < <(awk '
             /^\[\[bench\]\]$/ { in_bench = 1; next }
             /^\[/ && $0 != "[[bench]]" { in_bench = 0 }
             in_bench && /^[[:space:]]*name[[:space:]]*=/ {
               split($0, parts, "\"")
               if (length(parts) >= 2) {
                 print parts[2]
               }
             }
           ' benches/Cargo.toml)

           if [ "${#bench_names[@]}" -eq 0 ]; then
             echo "⚠️ No benchmarks discovered from benches/Cargo.toml"
             exit 1
           fi

           SUCCESS_COUNT=0
           FAIL_COUNT=0

           for bench_name in "${bench_names[@]}"; do
             CURRENT_TIME=$(date +%s)
             ELAPSED=$((CURRENT_TIME - START_TIME))
             REMAINING=$((MAX_TOTAL_TIME - ELAPSED))

             if [ "$REMAINING" -lt 60 ]; then
               echo "⚠️ Approaching overall timeout ($ELAPSED seconds elapsed). Skipping remaining benchmarks."
               break
             fi

             timeout="300"
             case "$bench_name" in
               storage_operations|concurrent_operations|phase3_retrieval_accuracy)
                 timeout="900"
                 ;;
               phase3_cache_performance|compression_benchmark)
                 timeout="300"
                 ;;
             esac

             if [ "$timeout" -gt "$REMAINING" ]; then
               timeout="$REMAINING"
             fi

             echo ""
             echo "▶️ Running $bench_name benchmark (timeout: ${timeout}s, elapsed: ${ELAPSED}s)..."

             if timeout "$timeout" cargo bench -p do-memory-benches --bench "$bench_name" --quiet 2>/dev/null; then
               echo "✅ $bench_name completed successfully"
               SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
             else
               echo "⚠️ $bench_name timed out or failed, continuing..."
               FAIL_COUNT=$((FAIL_COUNT + 1))
             fi
           done

           END_TIME=$(date +%s)
           TOTAL_ELAPSED=$((END_TIME - START_TIME))
           echo ""
           echo "=== Benchmark Suite Summary ==="
           echo "Total time: ${TOTAL_ELAPSED}s ($(echo "scale=2; $TOTAL_ELAPSED/60" | bc)m)"
           echo "Successful: $SUCCESS_COUNT"
           echo "Failed/Timeout: $FAIL_COUNT"
           echo "End time: $(date)"

           criterion_dir="$CARGO_TARGET_DIR/criterion"
           if [ ! -d "$criterion_dir" ] || [ -z "$(find "$criterion_dir" -name "*.json" 2>/dev/null)" ]; then
             # W2.5: missing Criterion output must block (no dummy soft-pass for CI signal)
             echo "❌ No Criterion benchmark results found under $criterion_dir"
             echo "Refusing to generate dummy results for gated benchmark jobs."
             exit 1
           else
             echo "✅ Found benchmark results in $criterion_dir"
           fi

      - name: Convert Criterion output to bencher format
        run: |
           set -euo pipefail
           # jq is required for reliable Criterion estimates.json parsing (W2.5)
           if ! command -v jq >/dev/null 2>&1; then
             sudo apt-get update -qq && sudo apt-get install -y -qq jq
           fi
           mkdir -p benchmark_results
           bench_results_file="benchmark_results/output.txt"
           criterion_dir="$CARGO_TARGET_DIR/criterion"
           : > "$bench_results_file"
           estimate_count=0
           converted_count=0
           if [ -d "$criterion_dir" ]; then
             while IFS= read -r json_file; do
               estimate_count=$((estimate_count + 1))
               # Criterion layout: <group>/<bench>/new/estimates.json (also base/change)
               bench_name=$(echo "$json_file" | sed "s|$criterion_dir/||" | \
                 sed 's|/new/estimates.json||' | sed 's|/base/estimates.json||' | \
                 sed 's|/change/estimates.json||' | sed 's|/.*benchmarks/||' | tr '/' '_')
               # Prefer jq: Criterion stores mean/std_dev.point_estimate as floats (ns)
               mean_ns=$(jq -r '(.mean.point_estimate // empty) | floor' "$json_file" 2>/dev/null || true)
               std_dev=$(jq -r '(.std_dev.point_estimate // empty) | floor' "$json_file" 2>/dev/null || true)
               if [ -z "$mean_ns" ] || [ "$mean_ns" = "null" ]; then
                 # Fallback for older/nested layouts
                 mean_ns=$(jq -r '.. | objects | select(has("point_estimate")) | .point_estimate' "$json_file" 2>/dev/null \
                   | head -1 | awk '{printf "%d", $1}')
               fi
               if [ -n "$mean_ns" ] && [ "$mean_ns" != "0" ] && [ "$mean_ns" != "null" ]; then
                 if [ -n "${std_dev:-}" ] && [ "$std_dev" != "0" ] && [ "$std_dev" != "null" ]; then
                   echo "test $bench_name ... bench: $mean_ns ns/iter (+/- $std_dev)" >> "$bench_results_file"
                 else
                   echo "test $bench_name ... bench: $mean_ns ns/iter (+/- 0)" >> "$bench_results_file"
                 fi
                 converted_count=$((converted_count + 1))
               else
                 echo "⚠️  Could not parse mean from $json_file (sample):"
                 head -c 400 "$json_file" || true
                 echo
               fi
             done < <(find "$criterion_dir" -type f -name "estimates.json" 2>/dev/null | sort)
             if [ -s "$bench_results_file" ]; then
               sort -u "$bench_results_file" -o "$bench_results_file"
             fi
           fi
           echo "Criterion estimates.json files found: $estimate_count"
           echo "Converted benchmark lines: $converted_count"
           if [ ! -s "$bench_results_file" ]; then
             # W2.5: empty converted results block — do not substitute dummy data
             echo "❌ No converted Criterion estimates; refusing dummy benchmark soft-pass"
             echo "Listing criterion tree (depth 4):"
             find "$criterion_dir" -maxdepth 4 -type f 2>/dev/null | head -50 || true
             exit 1
           fi
           echo "Generated benchmark results:"
           echo "Total benchmark entries: $(wc -l < "$bench_results_file")"
           head -20 "$bench_results_file"

      - name: Cleanup sccache
        if: always()
        run: |
          sccache --stop-server || true
          sccache --show-stats || true

      - name: Stage benchmark results for upload
        run: |
          set -euo pipefail
          if [ ! -s benchmark_results/output.txt ]; then
            echo "❌ benchmark_results/output.txt missing or empty before staging"
            exit 1
          fi
          mkdir -p "${{ runner.temp }}/cargo-target"
          cp benchmark_results/output.txt "${{ runner.temp }}/cargo-target/output.txt"
          echo "Staged files for upload:"
          ls -la "${{ runner.temp }}/cargo-target/" | head -20

      - name: Archive benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: ${{ runner.temp }}/cargo-target/
          if-no-files-found: error
          retention-days: 90

  store-benchmark:
    name: Store Benchmark Results
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.benchmark.result == 'success'
    permissions:
      contents: write
      actions: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Download benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: .
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          name: Rust Benchmarks
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '110%'
          comment-on-alert: true
          # W2.5: >10% regression blocks the job (was soft-fail only)
          fail-on-alert: true
          alert-comment-cc-users: '@maintainers'

  regression-check:
    name: Check for Performance Regression
    runs-on: ubuntu-latest
    needs: benchmark
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      needs.benchmark.result == 'success'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Download benchmark results (regression check)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: .
        continue-on-error: true

      - name: Check for regression
        run: |
          if [ ! -f "output.txt" ]; then
            # W2.5: missing artifact is a signal failure, not success
            echo "❌ No benchmark results found for regression check"
            exit 1
          fi
          echo "✅ Benchmark results found"
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        with:
          script: |
              const fs = require('fs');
              if (!fs.existsSync('output.txt')) {
                const errorMsg = `## Performance Benchmark Results\n\n⚠️ **Benchmark artifacts not available**`;
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: errorMsg
                });
                return;
              }
              const results = fs.readFileSync('output.txt', 'utf8');
              const body = `## Performance Benchmark Results\n\n<details><summary>Click to expand</summary>\n\n\`\`\`\n${results}\n\`\`\`\n\n</details>`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
