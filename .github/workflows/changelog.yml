---
# Changelog Generation Workflow
# Automatically generates and updates CHANGELOG.md using git-cliff
# Triggered on GitHub release events and version tags
#
# ADR-034 Compliance: Phase 4 - Changelog Automation
# - Uses git-cliff with conventional commits
# - Integrates with cargo-dist release workflow
# - Maintains Keep a Changelog format

name: Changelog

'on':
  # Trigger on release publication (after release.yml completes)
  release:
    types: [published]

  # Allow manual trigger for changelog regeneration
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to generate changelog for (e.g., v0.1.16)'
        required: false
        type: string

  # Trigger on version tags for immediate changelog update
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for accurate changelog
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@4

      - name: Determine version tag
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            # Manual dispatch with explicit tag
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            # Release event - use release tag
            TAG="${{ github.event.release.tag_name }}"
          else
            # Push tag event
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Generating changelog for ${TAG}"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Generate the new changelog section for this version
          # --prepend ensures it's added at the top (after header)
          # --no-exec avoids running commit hooks
          git-cliff --tag "${TAG}" --prepend CHANGELOG.md --unreleased

          # Extract just the new section for release notes
          git-cliff --tag "${TAG}" --unreleased > /tmp/release_notes.md

          echo "changelog_generated=true" >> "$GITHUB_OUTPUT"

          # Show what was generated
          echo "=== Generated Changelog Section ==="
          head -50 /tmp/release_notes.md

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changelog updates
        id: commit
        run: |
          # Check if there are changes to commit
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for v${VERSION}

          Generated by git-cliff from conventional commits.

          Co-Authored-By: git-cliff <noreply@git-cliff.org>"

          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changelog updates
        if: steps.commit.outputs.committed == 'true'
        run: |
          # Push to main branch
          git push origin HEAD:main

      - name: Update release notes (if release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Read the generated release notes
          NOTES=$(cat /tmp/release_notes.md)

          # Update the GitHub release with the generated changelog
          # This enhances the auto-generated notes from cargo-dist
          gh release view "${TAG}" --json body --jq '.body' > /tmp/original_body.md

          # Combine original body (if any) with changelog
          {
            echo "## What's Changed"
            echo ""
            cat /tmp/release_notes.md
            echo ""
            echo "---"
            echo ""
            cat /tmp/original_body.md
          } > /tmp/combined_body.md

          gh release edit "${TAG}" --notes-file /tmp/combined_body.md

  # Notify on failure
  notify-failure:
    name: Notify on Failure
    needs: generate-changelog
    if: failure()
    runs-on: ubuntu-22.04

    steps:
      - name: Create issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Changelog generation failed for ${{ github.ref_name }}" \
            --body "The changelog generation workflow failed.

          - **Workflow**: ${{ github.workflow }}
          - **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - **Trigger**: ${{ github.event_name }}
          - **Tag**: ${{ github.ref_name }}

          Please investigate and regenerate the changelog manually if needed:

          \`\`\`bash
          git-cliff --tag ${{ github.ref_name }} --prepend CHANGELOG.md
          \`\`\`
          " \
            --label "ci,documentation"

