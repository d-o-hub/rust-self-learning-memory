---
name: CI
permissions:
  contents: read
  checks: write
  security-events: write

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Wait for quick-check to pass before running expensive jobs
  # This implements the "fast checks first" pattern for 2026 best practices
  check-quick-check:
    name: Check Quick Check Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Only run on PRs and never for Dependabot to avoid timeout issues
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    steps:
      - name: Wait for Quick Check with timeout protection
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          allowed-conclusions: success,skipped,cancelled
          check-name: 'Quick PR Check (Format + Clippy)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: Quick Check

  # Core testing - optimized for speed with proper timeouts
  test:
    name: Tests
    runs-on: ubuntu-latest
    # Only depend on check-quick-check for PRs, skip dependency for push events
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 30
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /opt/hostedtoolcache/* || true
          sudo apt-get clean || true
          df -h
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: ci-test
          install-nextest: "true"

      - name: Run tests with timeout protection
        run: |
          # Run the practical workspace test surface for required CI checks.
          # Intentionally exclude benches/examples/do-memory-test-utils from required PR gating
          # to keep runtime stable while still covering unit + integration tests.
          cargo nextest run --profile ci --workspace \
            --exclude do-memory-benches \
            --exclude do-memory-examples \
            --exclude do-memory-test-utils
      - name: Upload nextest JUnit (test)
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: nextest-junit-test
          path: ${{ env.CARGO_TARGET_DIR }}/nextest/ci/junit.xml
          if-no-files-found: warn

  # MCP builds - simplified with timeout protection
  mcp-build:
    name: MCP Build
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 30
    steps:
      - name: Free disk space for WASM builds
        run: |
          sudo rm -rf /opt/hostedtoolcache/*/12.* 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet/ 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android/ 2>/dev/null || true
          sudo rm -rf /opt/ghc/ 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          df -h
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: ci-mcp-build
          install-nextest: "true"
          save-cache: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Build and test (default)
        run: |
          timeout 600s cargo build -p do-memory-mcp || exit 1
          timeout 600s cargo nextest run --profile ci -p do-memory-mcp || exit 1
      - name: Upload nextest JUnit (mcp-build)
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: nextest-junit-mcp-build
          path: ${{ env.CARGO_TARGET_DIR }}/nextest/ci/junit.xml
          if-no-files-found: warn

  # Multi-platform testing - simplified matrix
  multi-platform:
    name: Multi-Platform Test
    runs-on: ${{ matrix.os }}
    needs: [check-quick-check]
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: ci-multi-platform-${{ matrix.os }}
          install-nextest: "true"
          save-cache: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Run tests on ${{ matrix.os }}
        run: |
          # Cross-platform timeout wrapper with extended time (1800s = 30min)
          # macOS has `gtimeout` from coreutils, or use perl as fallback
          if command -v timeout >/dev/null 2>&1; then
            # Linux with GNU timeout
            timeout 1800s cargo nextest run --profile ci --workspace --exclude do-memory-benches --exclude do-memory-examples --exclude do-memory-test-utils
          elif command -v gtimeout >/dev/null 2>&1; then
            # macOS with GNU timeout (coreutils)
            gtimeout 1800s cargo nextest run --profile ci --workspace --exclude do-memory-benches --exclude do-memory-examples --exclude do-memory-test-utils
          else
            # macOS fallback: use perl for portable timeout
            # Use -- to separate perl args from command args
            perl -e 'alarm 1800; exec @ARGV' -- cargo nextest run --profile ci --workspace --exclude do-memory-benches --exclude do-memory-examples --exclude do-memory-test-utils
          fi
      - name: Upload nextest JUnit (multi-platform)
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: nextest-junit-multi-platform-${{ matrix.os }}
          path: ${{ env.CARGO_TARGET_DIR }}/nextest/ci/junit.xml
          if-no-files-found: warn

  # Quality gates - final validation
  # NOTE: This job is NOT in the needs: list of other jobs to prevent blocking
  # Coverage is collected separately in coverage.yml workflow
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # Required for Codecov OIDC authentication
    timeout-minutes: 45    # Increased from 30 to accommodate slow coverage
    needs: [test, mcp-build, multi-platform]
    steps:
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: ci-quality-gates
          components: clippy, rustfmt, llvm-tools-preview
          install-llvm-cov: "true"
          save-cache: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Install required tools
        run: cargo install --locked cargo-audit
        shell: bash

      - name: Security Audit
        run: |
          # Security audit with 20 minute timeout
          timeout 1200s cargo audit || echo "Security audit completed with warnings"
        env:
          RUST_LOG: info
      - name: Coverage Check (Workspace, PR-aligned)
        run: |
          # Coverage check with 40 minute timeout
          # Use --workspace so Codecov patch status can map PR diff lines correctly.
          # Exclude heavy non-gating crates to keep runtime reasonable.
          timeout 2400s cargo llvm-cov --workspace \
            --exclude do-memory-benches \
            --exclude do-memory-examples \
            --exclude do-memory-test-utils \
            --lcov --output-path lcov.info --jobs 4
        env:
          RUST_LOG: info
      - name: Upload coverage
        uses: codecov/codecov-action@cb6530fbecd68d5f1ee7a3dcd113450ea8d5d6d4 # v5.1.2
        with:
          files: ./lcov.info
          fail_ci_if_error: false

  # Semver compatibility check - prevents accidental breaking changes
  semver-check:
    name: Semver Check
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Increased from 15 - workspace rustdoc builds are slow
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Required for --baseline-branch

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: ci-semver-check
          save-cache: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Cache semver baseline
        uses: actions/cache@0c907a75c2c80ebcb7f088228285e79d13c99a0d # v4.2.1
        with:
          path: |
            ~/.cargo/semver-checks
            target/semver-checks
          key: semver-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.base_ref || 'main' }}
          restore-keys: |
            semver-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            semver-${{ runner.os }}-
      - name: Install cargo-semver-checks
        run: cargo install --locked cargo-semver-checks
        shell: bash
      - name: Check semver compatibility
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Use baseline caching for PRs - compare against main branch
            cargo semver-checks check-release --workspace --baseline-branch main
          else
            # Full check for main/develop branch pushes
            cargo semver-checks check-release --workspace
          fi
        continue-on-error: true  # Informational only, not blocking
