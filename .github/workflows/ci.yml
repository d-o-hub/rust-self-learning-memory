---
name: CI
permissions:
  contents: read
  checks: write
  security-events: write

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Wait for quick-check to pass before running expensive jobs
  # This implements the "fast checks first" pattern for 2026 best practices
  check-quick-check:
    name: Check Quick Check Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Only run on PRs and never for Dependabot to avoid timeout issues
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    steps:
      - name: Wait for Quick Check with timeout protection
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Quick PR Check (Format + Clippy)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: Quick Check
          fail-on-no-checks: false

  # Core testing - optimized for speed with proper timeouts
  test:
    name: Tests
    runs-on: ubuntu-latest
    # Only depend on check-quick-check for PRs, skip dependency for push events
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 30
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /opt/hostedtoolcache/* || true
          sudo apt-get clean || true
          df -h
      - uses: actions/checkout@v6
      - name: Setup isolated target dir
        run: |
          chmod +x scripts/setup-target-dir.sh
          ./scripts/setup-target-dir.sh ci-test
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
      - name: Install nextest
        run: cargo install --locked cargo-nextest
        shell: bash
      - name: Run tests with timeout protection
        run: |
          # Run the practical workspace test surface for required CI checks.
          # Intentionally exclude benches/examples/test-utils from required PR gating
          # to keep runtime stable while still covering unit + integration tests.
          cargo nextest run --profile ci --workspace \
            --exclude memory-benches \
            --exclude memory-examples \
            --exclude test-utils
      - name: Upload nextest JUnit (test)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextest-junit-test
          path: ${{ env.CARGO_TARGET_DIR }}/nextest/ci/junit.xml
          if-no-files-found: warn

  # MCP builds - simplified with timeout protection
  mcp-build:
    name: MCP Build
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 15
    steps:
      - name: Free disk space for WASM builds
        run: |
          sudo rm -rf /opt/hostedtoolcache/*/12.* 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet/ 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android/ 2>/dev/null || true
          sudo rm -rf /opt/ghc/ 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          df -h
      - uses: actions/checkout@v6
      - name: Setup isolated target dir
        run: |
          chmod +x scripts/setup-target-dir.sh
          ./scripts/setup-target-dir.sh ci-mcp-build
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
      - name: Install nextest
        run: cargo install --locked cargo-nextest
        shell: bash
      - name: Build and test (default)
        run: |
          timeout 600s cargo build -p memory-mcp || exit 1
          timeout 600s cargo nextest run --profile ci -p memory-mcp || exit 1
      - name: Upload nextest JUnit (mcp-build)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextest-junit-mcp-build
          path: ${{ env.CARGO_TARGET_DIR }}/nextest/ci/junit.xml
          if-no-files-found: warn

  # Multi-platform testing - simplified matrix
  multi-platform:
    name: Multi-Platform Test
    runs-on: ${{ matrix.os }}
    needs: [check-quick-check]
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Setup isolated target dir
        run: |
          chmod +x scripts/setup-target-dir.sh
          ./scripts/setup-target-dir.sh ci-multi-platform-${{ matrix.os }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mold linker (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
      - name: Install nextest
        run: cargo install --locked cargo-nextest
      - name: Run tests on ${{ matrix.os }}
        run: |
          # Cross-platform timeout wrapper with extended time (900s = 15min)
          # macOS has `gtimeout` from coreutils, or use perl as fallback
          if command -v timeout >/dev/null 2>&1; then
            # Linux with GNU timeout
            timeout 900s cargo nextest run --profile ci --workspace --exclude memory-benches --exclude memory-examples --exclude test-utils
          elif command -v gtimeout >/dev/null 2>&1; then
            # macOS with GNU timeout (coreutils)
            gtimeout 900s cargo nextest run --profile ci --workspace --exclude memory-benches --exclude memory-examples --exclude test-utils
          else
            # macOS fallback: use perl for portable timeout
            # Use -- to separate perl args from command args
            perl -e 'alarm 900; exec @ARGV' -- cargo nextest run --profile ci --workspace --exclude memory-benches --exclude memory-examples --exclude test-utils
          fi
      - name: Upload nextest JUnit (multi-platform)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextest-junit-multi-platform-${{ matrix.os }}
          path: ${{ env.CARGO_TARGET_DIR }}/nextest/ci/junit.xml
          if-no-files-found: warn

  # Quality gates - final validation
  # NOTE: This job is NOT in the needs: list of other jobs to prevent blocking
  # Coverage is collected separately in coverage.yml workflow
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # Required for Codecov OIDC authentication
    timeout-minutes: 45    # Increased from 30 to accommodate slow coverage
    needs: [test, mcp-build, multi-platform]
    steps:
      - uses: actions/checkout@v6
      - name: Setup isolated target dir
        run: |
          chmod +x scripts/setup-target-dir.sh
          ./scripts/setup-target-dir.sh ci-quality-gates
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
      - name: Install required tools
        run: cargo install --locked cargo-llvm-cov cargo-audit
        shell: bash
      - name: Security Audit
        run: |
          # Security audit with 20 minute timeout
          timeout 1200s cargo audit || echo "Security audit completed with warnings"
        env:
          RUST_LOG: info
      - name: Coverage Check (Workspace, PR-aligned)
        run: |
          # Coverage check with 40 minute timeout
          # Use --workspace so Codecov patch status can map PR diff lines correctly.
          # Exclude heavy non-gating crates to keep runtime reasonable.
          timeout 2400s cargo llvm-cov --workspace \
            --exclude memory-benches \
            --exclude memory-examples \
            --exclude test-utils \
            --lcov --output-path lcov.info --jobs 4
        env:
          RUST_LOG: info
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./lcov.info
          fail_ci_if_error: false

  # Semver compatibility check - prevents accidental breaking changes
  semver-check:
    name: Semver Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup isolated target dir
        run: |
          chmod +x scripts/setup-target-dir.sh
          ./scripts/setup-target-dir.sh ci-semver-check
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
      - name: Install cargo-semver-checks
        run: cargo install --locked cargo-semver-checks
        shell: bash
      - name: Check semver compatibility
        run: cargo semver-checks check-release --workspace
        continue-on-error: true  # Informational only, not blocking
