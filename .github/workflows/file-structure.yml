---
name: File Structure Validation
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Wait for quick-check to pass before running file structure validation
  # This implements the "fast checks first" pattern for 2026 best practices
  check-quick-check:
    name: Check Quick Check Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Only run on PRs and never for Dependabot to avoid timeout issues
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    steps:
      - name: Wait for Quick Check with timeout protection
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Quick PR Check (Format + Clippy)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: Quick Check
          fail-on-no-checks: false

  file-structure-check:
    name: File Structure Validation
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate file locations
        run: |
          #!/bin/bash
          set -e

          echo "Validating file locations according to AGENTS.md..."
          echo ""

          # Permanent docs that should stay in root
          PERMANENT_DOCS=(
            "README.md"
            "AGENTS.md"
            "CHANGELOG.md"
            "CLAUDE.md"
            "GEMINI.md"
            "CONTRIBUTING.md"
            "SECURITY.md"
            "DEPLOYMENT.md"
            "TESTING.md"
            "LICENSE"
            "LICENSE-*"
          )

          # Check for misplaced markdown files in root
          FOUND_ISSUES=0

          for file in *.md; do
            # Skip if no .md files exist
            [ -f "$file" ] || continue

            # Check if file is permanent doc
            is_permanent=false
            for perm in "${PERMANENT_DOCS[@]}"; do
              if [[ "$(basename "$file")" == "$perm" ]]; then
                is_permanent=true
                break
              fi
            done

            if [ "$is_permanent" = false ]; then
              echo "❌ Misplaced markdown file found in root: $file"
              echo "   Should be in: plans/ directory"
              FOUND_ISSUES=1
            fi
          done

          # Check for misplaced files in docs/ that should be in plans/
          for file in docs/*.md; do
            # Skip if no files exist
            [ -f "$file" ] || continue

            filename=$(basename "$file")

            # Check if it's an analysis/validation/report type file
            case "$filename" in
              *analysis*|*report*|*gap*|*validation*|*review*|*plan*|*roadmap*|*strategy*)
                echo "❌ Misplaced file in docs/: $filename"
                echo "   Should be in: plans/ directory (check plans/STATUS, plans/ROADMAPS, etc.)"
                FOUND_ISSUES=1
                ;;
            esac
          done

          # Verify plans/ directory structure exists
          REQUIRED_PLANS_DIRS=(
            "plans/ARCHITECTURE"
            "plans/CONFIGURATION"
            "plans/ROADMAPS"
            "plans/STATUS"
            "plans/research"
          )

          for dir in "${REQUIRED_PLANS_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "⚠️  Required directory missing: $dir"
              # This is a warning, not a failure
            fi
          done

          echo ""
          if [ $FOUND_ISSUES -ne 0 ]; then
            echo "❌ File structure validation FAILED"
            echo ""
            echo "Fix misplaced files by running:"
            echo "  ./scripts/fix-file-locations.sh --dry-run"
            echo "  ./scripts/fix-file-locations.sh"
            echo ""
            echo "See AGENTS.md line 28 for file organization rules"
            exit 1
          fi

          echo "✅ File structure validation PASSED"
          echo "All markdown files are in correct locations"
