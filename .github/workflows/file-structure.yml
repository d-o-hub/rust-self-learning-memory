---
name: File Structure Validation
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # Wait for quick-check to pass before running file structure validation
  # This implements the "fast checks first" pattern for 2026 best practices
  check-quick-check:
    name: Check Quick Check Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Only run on PRs and never for Dependabot to avoid timeout issues
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    steps:
      - name: Wait for Quick Check with timeout protection
        uses: lewagon/wait-on-check-action@1d57e2c51a58d812d2765e036a028b6bdb5a6154
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Quick PR Check (Format + Clippy)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: Quick Check
          allowed-conclusions: success,skipped,cancelled

  file-structure-check:
    name: File Structure Validation
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate version line (0.1.x only)
        run: |
          #!/bin/bash
          set -e

          echo "Validating workspace version stays on 0.1.x patch line..."
          echo ""

          VERSION=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+[^"]*)".*/\1/')

          if [[ -z "$VERSION" ]]; then
            echo "❌ Could not extract version from Cargo.toml"
            exit 1
          fi

          echo "  Workspace version: $VERSION"

          MAJOR_MINOR=$(echo "$VERSION" | grep -oP '^\d+\.\d+')

          if [[ "$MAJOR_MINOR" != "0.1" ]]; then
            echo ""
            echo "❌ VERSION POLICY VIOLATION"
            echo ""
            echo "   Found version: $VERSION"
            echo "   Expected: 0.1.x (patch releases only)"
            echo ""
            echo "   The project stays on the 0.1.x release line."
            echo "   Minor/major bumps (0.2.0, 1.0.0) require explicit human approval."
            echo "   Pre-1.0 semver allows breaking changes in patch releases (§4)."
            echo ""
            echo "   Fix: Change version in Cargo.toml back to 0.1.x"
            echo "   If you have human approval for a non-patch bump, add 'version-override' label to the PR."
            exit 1
          fi

          # Also check all workspace members match
          MEMBERS=$(find . -name "Cargo.toml" -not -path "./target/*" -not -path "./fuzz/*" | sort)
          MISMATCH=0
          for toml in $MEMBERS; do
            # Check for hardcoded version (not workspace inheritance)
            HARD_VERSION=$(grep -E '^version\s*=\s*"[0-9]' "$toml" 2>/dev/null | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/' || true)
            if [[ -n "$HARD_VERSION" && "$HARD_VERSION" != "$VERSION" ]]; then
              echo "  ❌ $toml has version $HARD_VERSION (expected $VERSION)"
              MISMATCH=1
            fi
            # Check for inter-crate version references that don't match
            INTER_CRATE=$(grep -oP 'do-memory-\S+.*?version\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' "$toml" 2>/dev/null || true)
            for v in $INTER_CRATE; do
              if [[ "$v" != "$VERSION" ]]; then
                echo "  ❌ $toml has inter-crate dep version $v (expected $VERSION)"
                MISMATCH=1
              fi
            done
          done

          if [[ $MISMATCH -ne 0 ]]; then
            echo ""
            echo "❌ Version consistency check FAILED"
            echo "   All crate versions and inter-crate dependencies must match the workspace version."
            exit 1
          fi

          echo "  ✅ Version line: 0.1.x (correct)"
          echo "  ✅ All crate versions consistent"
          echo ""

      - name: Validate file locations
        run: |
          #!/bin/bash
          set -e

          echo "Validating file locations according to AGENTS.md..."
          echo ""

          # Permanent docs that should stay in root
          PERMANENT_DOCS=(
            "README.md"
            "AGENTS.md"
            "CHANGELOG.md"
            "CLAUDE.md"
            "GEMINI.md"
            "CONTRIBUTING.md"
            "SECURITY.md"
            "DEPLOYMENT.md"
            "TESTING.md"
            "LICENSE"
            "LICENSE-*"
          )

          # Check for misplaced markdown files in root
          FOUND_ISSUES=0

          for file in *.md; do
            # Skip if no .md files exist
            [ -f "$file" ] || continue

            # Check if file is permanent doc
            is_permanent=false
            for perm in "${PERMANENT_DOCS[@]}"; do
              if [[ "$(basename "$file")" == "$perm" ]]; then
                is_permanent=true
                break
              fi
            done

            if [ "$is_permanent" = false ]; then
              echo "❌ Misplaced markdown file found in root: $file"
              echo "   Should be in: plans/ directory"
              FOUND_ISSUES=1
            fi
          done

          # Check for misplaced files in docs/ that should be in plans/
          for file in docs/*.md; do
            # Skip if no files exist
            [ -f "$file" ] || continue

            filename=$(basename "$file")

            # Check if it's an analysis/validation/report type file
            case "$filename" in
              *analysis*|*report*|*gap*|*validation*|*review*|*plan*|*roadmap*|*strategy*)
                echo "❌ Misplaced file in docs/: $filename"
                echo "   Should be in: plans/ directory (check plans/STATUS, plans/ROADMAPS, etc.)"
                FOUND_ISSUES=1
                ;;
            esac
          done

          # Verify plans/ directory structure exists
          REQUIRED_PLANS_DIRS=(
            "plans/ARCHITECTURE"
            "plans/CONFIGURATION"
            "plans/ROADMAPS"
            "plans/STATUS"
            "plans/research"
          )

          for dir in "${REQUIRED_PLANS_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "⚠️  Required directory missing: $dir"
              # This is a warning, not a failure
            fi
          done

          echo ""
          if [ $FOUND_ISSUES -ne 0 ]; then
            echo "❌ File structure validation FAILED"
            echo ""
            echo "Fix misplaced files by running:"
            echo "  ./scripts/fix-file-locations.sh --dry-run"
            echo "  ./scripts/fix-file-locations.sh"
            echo ""
            echo "See AGENTS.md line 28 for file organization rules"
            exit 1
          fi

          echo "✅ File structure validation PASSED"
          echo "All markdown files are in correct locations"
