name: Fuzzing

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at midnight on Sunday
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration to run fuzzing per target (seconds)'
        required: true
        default: '300'

jobs:
  fuzz:
    runs-on: ubuntu-latest
    env:
      FUZZ_DURATION: ${{ github.event.inputs.duration || '300' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools

      - name: Cache cargo-fuzz
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: ${{ runner.os }}-cargo-fuzz

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz &> /dev/null; then
            cargo install cargo-fuzz
          fi

      - name: Fuzz MCP JSON-RPC
        continue-on-error: true
        run: |
          cargo fuzz run fuzz_mcp_jsonrpc -- "-max_total_time=$FUZZ_DURATION"

      - name: Fuzz Postcard Roundtrip
        continue-on-error: true
        run: |
          cargo fuzz run fuzz_postcard_roundtrip -- "-max_total_time=$FUZZ_DURATION"

      - name: Fuzz Search Matchers
        continue-on-error: true
        run: |
          cargo fuzz run fuzz_search_matchers -- "-max_total_time=$FUZZ_DURATION"

      - name: Upload Crash Artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
