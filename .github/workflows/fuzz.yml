name: Fuzzing

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at midnight on Sunday
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration to run fuzzing per target (seconds)'
        required: true
        default: '300'

jobs:
  fuzz:
    runs-on: ubuntu-latest
    env:
      FUZZ_DURATION: ${{ inputs.duration || '300' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools

      - name: Cache cargo-fuzz
        uses: actions/cache@0c907a75c2c80ebcb7f088228285e798b750cf8f # v4.2.1
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: ${{ runner.os }}-cargo-fuzz

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz &> /dev/null; then
            cargo install cargo-fuzz
          fi

      - name: Fuzz MCP JSON-RPC
        continue-on-error: true
        run: |
          cargo fuzz run fuzz_mcp_jsonrpc -- "-max_total_time=$FUZZ_DURATION"

      - name: Fuzz Postcard Roundtrip
        continue-on-error: true
        run: |
          cargo fuzz run fuzz_postcard_roundtrip -- "-max_total_time=$FUZZ_DURATION"

      - name: Fuzz Search Matchers
        continue-on-error: true
        run: |
          cargo fuzz run fuzz_search_matchers -- "-max_total_time=$FUZZ_DURATION"

      - name: Upload Crash Artifacts
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
