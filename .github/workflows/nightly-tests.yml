---
name: Nightly Full Tests

# Runs all tests including slow integration tests marked with #[ignore]
# Triggered on schedule (nightly) and before releases

"on":
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      run_slow_tests:
        description: 'Run slow integration tests'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  checks: write

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Run all tests including slow ones
  full-test-suite:
    name: Full Test Suite (including slow tests)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Tier 1: Maximize build space
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check disk space before build
        run: |
          df -h
          AVAILABLE=$(df -BG / | awk 'NR==2 {print $4}' | sed 's/G//')
          echo "Available space: ${AVAILABLE}G"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Tier 2: Aggressive cleanup after checkout
      - name: Free disk space (aggressive)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/.ghcup /usr/local/lib/android
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          docker system prune -af --volumes || true
          sudo apt-get clean
          sudo apt-get autoclean
          df -h

      - name: Check disk space after cleanup
        run: |
          df -h
          AVAILABLE=$(df -BG / | awk 'NR==2 {print $4}' | sed 's/G//')
          echo "Available space: ${AVAILABLE}G"

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: nightly-full-test-suite
          install-nextest: "true"
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Check disk space before regular tests
        run: |
          df -h
          AVAILABLE=$(df -BG / | awk 'NR==2 {print $4}' | sed 's/G//')
          echo "Available space: ${AVAILABLE}G"
          if [ "$AVAILABLE" -lt 5 ]; then
            echo "❌ ERROR: Insufficient disk space (${AVAILABLE}G < 5G required)"
            df -h
            exit 1
          fi
          echo "✅ Sufficient disk space available: ${AVAILABLE}G"

      - name: Run regular tests
        run: |
          mkdir -p "$CARGO_TARGET_DIR/nextest/nightly"
          cargo nextest run --profile ci --lib --all --test-threads=4 \
            --message-format libtest-json > "$CARGO_TARGET_DIR/nextest/nightly/report.json"
          cargo nextest run --profile ci --tests --all --test-threads=4 \
            -E 'not binary(compliance)'

      - name: Cleanup after regular tests
        run: |
          echo "=== Cleaning up after regular tests ==="
          df -h
          sudo rm -rf "$CARGO_TARGET_DIR"/debug/deps/*.o
          sudo rm -rf "$CARGO_TARGET_DIR"/debug/deps/*.a
          sudo rm -rf "$CARGO_TARGET_DIR"/debug/.fingerprint
          sudo rm -rf "$CARGO_TARGET_DIR"/release/deps/*.o 2>/dev/null || true
          sudo rm -rf "$CARGO_TARGET_DIR"/release/deps/*.a 2>/dev/null || true
          sudo rm -rf ~/.cargo/registry/src/*/cargo-*
          sudo apt-get clean || true
          sudo apt-get autoclean || true
          docker system prune -af --volumes || true
          df -h

      - name: Check disk space before slow tests
        run: |
          df -h
          AVAILABLE=$(df -BG / | awk 'NR==2 {print $4}' | sed 's/G//')
          echo "Available space: ${AVAILABLE}G"
          if [ "$AVAILABLE" -lt 5 ]; then
            echo "❌ ERROR: Insufficient disk space (${AVAILABLE}G < 5G required)"
            df -h
            exit 1
          fi
          echo "✅ Sufficient disk space available: ${AVAILABLE}G"

      - name: Run slow integration tests (ignored tests)
        # yamllint disable rule:line-length
        run: |
          # Run tests marked with #[ignore]
          # These are slow integration tests that timeout in regular CI
          #
          # Tier 1: Run slow do-memory-core integration tests
          # Exclude test_pattern_accuracy_measurement (non-deterministic in CI)
          cargo nextest run -p do-memory-core --run-ignored only \
            -E 'not test(test_pattern_accuracy_measurement)'
          #
          # Tier 2: Run non-Turso integration tests
          # Exclusions:
          # - package(do-memory-storage-turso): All 70 tests blocked by libsql bug (ADR-027)
          # - test(quality_gate_): Runs heavy external processes (cargo clippy)
          # - test(test_update_command_): CLI subprocess tests timeout in CI
          # - test(test_wasi_): WASI implementation gaps (ADR-041)
          # - test(test_simple_execution|test_console_output|test_syntax_error|test_runtime_error): Flaky sandbox timing (ADR-041)
          cargo nextest run --all --run-ignored only \
            -E 'not (package(do-memory-storage-turso) | test(quality_gate_) | test(test_update_command_) | test(test_wasi_) | test(test_simple_execution) | test(test_console_output) | test(test_syntax_error) | test(test_runtime_error) | test(should_scale_processing_with_different_worker_counts))'
        env:
          # yamllint enable rule:line-length
          RUST_TEST_THREADS: 2

      - name: Cleanup artifacts after slow tests
        if: always()
        run: |
          echo "=== Final cleanup after slow tests ==="
          df -h
          cargo clean || true
          sudo rm -rf "$CARGO_TARGET_DIR"/debug
          sudo rm -rf "$CARGO_TARGET_DIR"/release
          sudo apt-get clean || true
          sudo apt-get autoclean || true
          df -h

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: nightly-test-results
          path: |
            ${{ env.CARGO_TARGET_DIR }}/debug/nextest/
            ${{ env.CARGO_TARGET_DIR }}/nextest/nightly/
          if-no-files-found: warn
          retention-days: 14

      - name: Extract trend metrics
        if: always()
        run: |
          mkdir -p metrics/trends
          DATE=$(date +%Y-%m-%d)
          echo "date,total,passed,failed,ignored" > metrics/trends/test-stats-${DATE}.csv
          # Parse nextest-json to extract metrics
          if [ -f "$CARGO_TARGET_DIR/nextest/nightly/report.json" ]; then
            TOTAL=$(jq '.summary.total' "$CARGO_TARGET_DIR/nextest/nightly/report.json")
            PASSED=$(jq '.summary.passed' "$CARGO_TARGET_DIR/nextest/nightly/report.json")
            FAILED=$(jq '.summary.failed' "$CARGO_TARGET_DIR/nextest/nightly/report.json")
            IGNORED=$(jq '.summary.ignored' "$CARGO_TARGET_DIR/nextest/nightly/report.json")
            echo "${DATE},${TOTAL},${PASSED},${FAILED},${IGNORED}" >> metrics/trends/test-stats-${DATE}.csv
          else
             # Fallback if report not found
             echo "${DATE},0,0,0,0" >> metrics/trends/test-stats-${DATE}.csv
          fi

      - name: Upload trend metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: nightly-test-trends
          path: metrics/trends/
          retention-days: 90

  # Run slow tests on ubuntu only (macOS not needed for slow test coverage)
  cross-platform-slow-tests:
    name: Slow Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Maximize build space (Linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== Freeing Disk Space on macOS ==="
          # Remove Xcode simulators to free space
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches || true
          sudo rm -rf ~/Library/Caches/Homebrew || true
          # Clean up any old logs
          sudo rm -rf /private/var/log/diagnosticPerusal || true
          df -h

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Tier 2: Aggressive cleanup after checkout (matches full-test-suite)
      - name: Free disk space (aggressive)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/.ghcup /usr/local/lib/android
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          docker system prune -af --volumes || true
          sudo apt-get clean
          sudo apt-get autoclean
          df -h

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: nightly-cross-platform-${{ matrix.os }}
          install-nextest: "true"
          cache-key: ${{ matrix.os }}-slow-tests
          save-cache: "false"

      - name: Check disk space before slow tests
        run: |
          df -h
          AVAILABLE=$(df -BG / | awk 'NR==2 {print $4}' | sed 's/G//' || echo "10")
          echo "Available space: ${AVAILABLE}G"
          if [ "$AVAILABLE" -lt 5 ]; then
            echo "❌ ERROR: Insufficient disk space (${AVAILABLE}G < 5G required)"
            df -h
            exit 1
          fi
          echo "✅ Sufficient disk space available: ${AVAILABLE}G"

      - name: Run slow integration tests
        # yamllint disable rule:line-length
        run: |
          # Tier 1: Run slow do-memory-core integration tests
          # Exclude test_pattern_accuracy_measurement (non-deterministic in CI)
          cargo nextest run -p do-memory-core --run-ignored only \
            -E 'not test(test_pattern_accuracy_measurement)'
          #
          # Tier 2: Run non-Turso integration tests
          # Exclusions:
          # - package(do-memory-storage-turso): All 70 tests blocked by libsql bug (ADR-027)
          # - test(quality_gate_): Runs heavy external processes (cargo clippy)
          # - test(test_update_command_): CLI subprocess tests timeout in CI
          # - test(test_wasi_): WASI implementation gaps (ADR-041)
          # - test(test_simple_execution|test_console_output|test_syntax_error|test_runtime_error): Flaky sandbox timing (ADR-041)
          cargo nextest run --all --run-ignored only \
            -E 'not (package(do-memory-storage-turso) | test(quality_gate_) | test(test_update_command_) | test(test_wasi_) | test(test_simple_execution) | test(test_console_output) | test(test_syntax_error) | test(test_runtime_error) | test(should_scale_processing_with_different_worker_counts))'
        env:
          # yamllint enable rule:line-length
          RUST_TEST_THREADS: 1

  # Summary job
  nightly-summary:
    name: Nightly Summary
    needs: [full-test-suite, cross-platform-slow-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.full-test-suite.result }}" == "failure" ] || \
             [ "${{ needs.cross-platform-slow-tests.result }}" == "failure" ]; then
            echo "❌ Some nightly tests failed"
            exit 1
          else
            echo "✅ All nightly tests passed"
          fi
