---
name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual publish)'
        required: false
        default: 'true'
        type: boolean
      crate:
        description: 'Specific crate to publish (empty = all)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing

jobs:
  # Publish do-memory-core first - other crates depend on it
  publish-core:
    name: Publish do-memory-core
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && (inputs.crate == '' || inputs.crate == 'do-memory-core') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        run: cargo install --locked cargo-semver-checks

      - name: Semver Check
        run: cargo semver-checks --package do-memory-core
        continue-on-error: true  # Pre-1.0 may have breaking changes

      - name: Verify metadata
        run: |
          cargo metadata --format-version 1 --no-deps | \
          jq -e ".packages[] | select(.name == \"do-memory-core\") | .description" > /dev/null

      - name: Dry Run Publish
        if: ${{ fromJSON(inputs.dry-run) == true }}
        run: cargo publish --package do-memory-core --dry-run

      - name: Publish to crates.io
        if: ${{ github.event_name == 'release' || fromJSON(inputs.dry-run) == false }}
        uses: rust-lang/crates-io-auth-action@v1
        with:
          crate: do-memory-core
          dry-run: false

  # Publish storage crates after core is published
  publish-storage:
    name: Publish ${{ matrix.crate }}
    runs-on: ubuntu-latest
    needs: [publish-core]
    if: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && (inputs.crate == '' || inputs.crate == 'do-memory-storage-turso' || inputs.crate == 'do-memory-storage-redb') }}
    strategy:
      fail-fast: false
      matrix:
        crate:
          - do-memory-storage-turso
          - do-memory-storage-redb
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        run: cargo install --locked cargo-semver-checks

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Semver Check
        run: cargo semver-checks --package ${{ matrix.crate }}
        continue-on-error: true  # Pre-1.0 may have breaking changes

      - name: Verify metadata
        run: |
          cargo metadata --format-version 1 --no-deps | \
          jq -e ".packages[] | select(.name == \"${{ matrix.crate }}\") | .description" > /dev/null

      - name: Dry Run Publish
        if: ${{ fromJSON(inputs.dry-run) == true }}
        run: cargo publish --package ${{ matrix.crate }} --dry-run

      - name: Publish to crates.io
        if: ${{ github.event_name == 'release' || fromJSON(inputs.dry-run) == false }}
        uses: rust-lang/crates-io-auth-action@v1
        with:
          crate: ${{ matrix.crate }}
          dry-run: false

  # Publish MCP crate after storage crates
  publish-mcp:
    name: Publish do-memory-mcp
    runs-on: ubuntu-latest
    needs: [publish-storage]
    if: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && (inputs.crate == '' || inputs.crate == 'do-memory-mcp') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        run: cargo install --locked cargo-semver-checks

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Semver Check
        run: cargo semver-checks --package do-memory-mcp
        continue-on-error: true  # Pre-1.0 may have breaking changes

      - name: Verify metadata
        run: |
          cargo metadata --format-version 1 --no-deps | \
          jq -e ".packages[] | select(.name == \"do-memory-mcp\") | .description" > /dev/null

      - name: Dry Run Publish
        if: ${{ fromJSON(inputs.dry-run) == true }}
        run: cargo publish --package do-memory-mcp --dry-run

      - name: Publish to crates.io
        if: ${{ github.event_name == 'release' || fromJSON(inputs.dry-run) == false }}
        uses: rust-lang/crates-io-auth-action@v1
        with:
          crate: do-memory-mcp
          dry-run: false
