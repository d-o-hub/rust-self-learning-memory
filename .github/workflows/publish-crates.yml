---
name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual publish)'
        required: false
        default: 'true'
        type: boolean
      crate:
        description: 'Specific crate to publish (empty = all)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # Publish do-memory-core first - other crates depend on it
  publish-core:
    name: Publish do-memory-core
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && (inputs.crate == '' || inputs.crate == 'do-memory-core') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: setup


      - name: Install cargo-semver-checks
        run: cargo install --locked cargo-semver-checks

      - name: Semver Check
        id: semver
        run: |
          cargo semver-checks --package do-memory-core 2>&1 | tee semver-output.txt || true
          echo '## Semver Check Results' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat semver-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        continue-on-error: true  # Pre-1.0 may have breaking changes

      - name: Verify metadata
        run: |
          cargo metadata --format-version 1 --no-deps | \
          jq -e ".packages[] | select(.name == \"do-memory-core\") | .description" > /dev/null

      - name: Check if version exists
        id: check-version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "do-memory-core") | .version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Local version: $VERSION"
          EXISTING=$(curl -s -H "User-Agent: rust-self-learning-memory-ci" "https://crates.io/api/v1/crates/do-memory-core/versions" | jq -r '.versions[0].num // empty')
          echo "Crates.io latest: $EXISTING"
          if [ "$EXISTING" = "$VERSION" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::do-memory-core@$VERSION already exists on crates.io, skipping"
            echo "Version exists on crates.io, will skip publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version not on crates.io, will publish"
          fi

      - name: Dry Run Publish
        if: ${{ inputs.dry-run && steps.check-version.outputs.exists != 'true' }}
        run: |
          echo "exists output: ${{ steps.check-version.outputs.exists }}"
          cargo publish --package do-memory-core --locked --dry-run

      - name: Publish to crates.io
        if: ${{ (github.event_name == 'release' || !inputs.dry-run) && steps.check-version.outputs.exists != 'true' }}
        run: |
          echo "exists output: ${{ steps.check-version.outputs.exists }}"
          cargo publish --package do-memory-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io propagation
        if: ${{ (github.event_name == 'release' || !inputs.dry-run) && steps.check-version.outputs.exists != 'true' }}
        run: |
          VERSION="${{ steps.check-version.outputs.version }}"
          CRATE_NAME="do-memory-core"
          for i in $(seq 1 20); do
            PUBLISHED=$(curl -s -H "User-Agent: rust-self-learning-memory-ci" \
              "https://crates.io/api/v1/crates/$CRATE_NAME/versions" | \
              jq -r '.versions[0].num // empty')
            [ "$PUBLISHED" = "$VERSION" ] && echo "✓ Propagated!" && break
            echo "Waiting for propagation... attempt $i/20"
            sleep 15
          done

  # Publish do-memory-storage-redb after core (no internal dependencies)
  publish-redb:
    name: Publish do-memory-storage-redb
    runs-on: ubuntu-latest
    needs: [publish-core]
    if: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && (inputs.crate == '' || inputs.crate == 'do-memory-storage-redb') }}
