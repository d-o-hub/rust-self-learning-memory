---
name: Release Drift Check

on:
  # Run weekly and on every push to main
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    name: Check for unreleased changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check version state
        id: check
        run: |
          # Get workspace version
          VERSION=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          LATEST_TAG=$(git tag --sort=-creatordate | head -1 || echo "none")
          EXPECTED_TAG="v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Count unreleased changes
          if [[ "$LATEST_TAG" != "none" ]]; then
            TOTAL=$(git rev-list --count "${LATEST_TAG}..HEAD" 2>/dev/null || echo 0)
            FEATS=$(git log "${LATEST_TAG}..HEAD" --oneline --grep="^feat" 2>/dev/null | wc -l)
            FIXES=$(git log "${LATEST_TAG}..HEAD" --oneline --grep="^fix" 2>/dev/null | wc -l)
          else
            TOTAL=0
            FEATS=0
            FIXES=0
          fi

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "feats=$FEATS" >> "$GITHUB_OUTPUT"
          echo "fixes=$FIXES" >> "$GITHUB_OUTPUT"

          # Check tag matches version
          if [[ "$LATEST_TAG" != "$EXPECTED_TAG" ]]; then
            echo "tag_drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_drift=false" >> "$GITHUB_OUTPUT"
          fi

          # Alert threshold: >5 feat/fix commits unreleased
          if [[ $((FEATS + FIXES)) -gt 5 ]]; then
            echo "needs_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update drift issue
        if: steps.check.outputs.needs_release == 'true' || steps.check.outputs.tag_drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="⚠️ Release drift: ${{ steps.check.outputs.total }} unreleased commits since ${{ steps.check.outputs.latest_tag }}"
          BODY="## Release Drift Detected

          | Metric | Value |
          |--------|-------|
          | Cargo.toml version | \`${{ steps.check.outputs.version }}\` |
          | Latest git tag | \`${{ steps.check.outputs.latest_tag }}\` |
          | Unreleased commits | ${{ steps.check.outputs.total }} |
          | Unreleased feat: | ${{ steps.check.outputs.feats }} |
          | Unreleased fix: | ${{ steps.check.outputs.fixes }} |
          | Tag drift | ${{ steps.check.outputs.tag_drift }} |

          ### Action Required
          Run \`./scripts/release-manager.sh validate\` to check release readiness.

          If ready to release:
          1. \`./scripts/verify-release-state.sh --check-tag --check-unreleased\`
          2. Update ROADMAP_ACTIVE.md and STATUS/CURRENT.md versions
          3. \`./scripts/release-manager.sh full --execute\`

          *This issue is auto-generated by the release-drift workflow.*"

          # Close existing drift issues
          gh issue list --label "release-drift" --state open --json number -q '.[].number' | while read -r num; do
            gh issue close "$num" --comment "Superseded by new drift check" 2>/dev/null || true
          done

          # Create new issue
          gh issue create --title "$TITLE" --body "$BODY" --label "release-drift" 2>/dev/null || \
            echo "Could not create issue (label may not exist)"

      - name: Summary
        run: |
          echo "### Release State" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cargo.toml | \`${{ steps.check.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest tag | \`${{ steps.check.outputs.latest_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unreleased | ${{ steps.check.outputs.total }} commits (${{ steps.check.outputs.feats }} feat, ${{ steps.check.outputs.fixes }} fix) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag drift | ${{ steps.check.outputs.tag_drift }} |" >> "$GITHUB_STEP_SUMMARY"
