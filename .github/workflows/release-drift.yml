name: Release Drift Check

on:
  # Warn before drift lands, then maintain the canonical issue from main.
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-drift:
    name: Check for unreleased changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      workspace_version: ${{ steps.check.outputs.workspace_version }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
      total: ${{ steps.check.outputs.total }}
      feats: ${{ steps.check.outputs.feats }}
      fixes: ${{ steps.check.outputs.fixes }}
      release_age_days: ${{ steps.check.outputs.release_age_days }}
      severity: ${{ steps.check.outputs.severity }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Check version state
        id: check
        run: |
          ./scripts/check-release-drift.sh | tee -a "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "### Release State" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| State | ${{ steps.check.outputs.severity }} (${{ steps.check.outputs.reason }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cargo.toml | \`${{ steps.check.outputs.workspace_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest tag | \`${{ steps.check.outputs.latest_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unreleased | ${{ steps.check.outputs.total }} commits (${{ steps.check.outputs.feats }} feat, ${{ steps.check.outputs.fixes }} fix) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release age | ${{ steps.check.outputs.release_age_days }} days |" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce release cadence
        if: >-
          github.event_name == 'pull_request' &&
          steps.check.outputs.severity == 'critical' &&
          !contains(github.event.pull_request.labels.*.name, 'release-preparation')
        run: |
          echo "Release cadence exceeded or version state is invalid: ${{ steps.check.outputs.reason }}" >&2
          echo "A maintainer may label the release PR 'release-preparation' to break a cadence deadlock." >&2
          exit 1

  maintain-issue:
    name: Maintain canonical drift issue
    needs: check-drift
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: release-drift-canonical-issue
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Create or update drift issue
        if: needs.check-drift.outputs.severity != 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="⚠️ Release due: ${{ needs.check-drift.outputs.total }} commits / ${{ needs.check-drift.outputs.release_age_days }} days since ${{ needs.check-drift.outputs.latest_tag }}"
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<'EOF'
          ## Release Drift Detected

          | Metric | Value |
          |--------|-------|
          | Severity | `${{ needs.check-drift.outputs.severity }}` |
          | Reason | `${{ needs.check-drift.outputs.reason }}` |
          | Cargo.toml version | `${{ needs.check-drift.outputs.workspace_version }}` |
          | Latest git tag | `${{ needs.check-drift.outputs.latest_tag }}` |
          | Release age | ${{ needs.check-drift.outputs.release_age_days }} days |
          | Unreleased commits | ${{ needs.check-drift.outputs.total }} |
          | Unreleased feat | ${{ needs.check-drift.outputs.feats }} |
          | Unreleased fix | ${{ needs.check-drift.outputs.fixes }} |

          ### Action Required

          1. Finalize `CHANGELOG.md`, `plans/ROADMAPS/ROADMAP_ACTIVE.md`, and
             `plans/STATUS/CURRENT.md` for `${{ needs.check-drift.outputs.workspace_version }}`.
          2. Merge the release-preparation PR and wait for all required checks on
             `main` to pass.
          3. From a clean, up-to-date local `main`, run
             `./scripts/release-manager.sh full --execute`. It pushes only the
             matching tag; mandatory `release.yml` performs the release.

          This issue is updated in place by the release-drift workflow. Cadence
          is warning at 20 commits/10 days and blocking at 30 commits/14 days.
          EOF

          gh label create release-drift --color "D93F0B" --description "Auto-generated release drift alerts" 2>/dev/null || true
          gh label create release-preparation --color "0E8A16" --description "Trusted-collaborator release preparation PR" 2>/dev/null || true
          ISSUE_NUMBER=$(gh issue list --label release-drift --state open --limit 1 --json number --jq '.[0].number // empty')
          if [[ -n "$ISSUE_NUMBER" ]]; then
            gh issue edit "$ISSUE_NUMBER" --title "$TITLE" --body-file "$BODY_FILE"
          else
            gh issue create --title "$TITLE" --body-file "$BODY_FILE" --label release-drift
          fi

      - name: Close resolved drift issue
        if: needs.check-drift.outputs.severity == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --label release-drift --state open --json number --jq '.[].number' |
            while read -r number; do
              gh issue close "$number" --comment "Release drift resolved by ${{ needs.check-drift.outputs.latest_tag }}."
            done
