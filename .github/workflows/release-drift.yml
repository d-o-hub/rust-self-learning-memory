---
name: Release Drift Check

on:
  # Run weekly and on every push to main
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    name: Check for unreleased changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: setup

      - name: Check version state
        id: check
        run: |
          # Primary: read plain-text VERSION file (ADR-061)
          VERSION=""
          if [[ -f VERSION ]]; then
            VERSION=$(tr -d '[:space:]' < VERSION)
          fi

          # Fallback: cargo metadata (authoritative Cargo.toml source)
          if [[ -z "$VERSION" ]]; then
            VERSION=$(cargo metadata --format-version=1 --no-deps 2>/dev/null \
              | jq -r '.packages[0].version' 2>/dev/null || true)
          fi

          # Last resort: grep (kept for environments without cargo/jq)
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            VERSION=$(grep -E '^\s*version\s*=\s*"[0-9]' Cargo.toml | head -1 \
              | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          fi

          LATEST_TAG=$(git tag --sort=-creatordate | head -1 || echo "none")
          EXPECTED_TAG="v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Validate VERSION file matches Cargo.toml workspace version
          CARGO_VERSION=$(cargo metadata --format-version=1 --no-deps 2>/dev/null \
            | jq -r '.packages[0].version' 2>/dev/null || true)
          if [[ -f VERSION && -n "$CARGO_VERSION" && "$CARGO_VERSION" != "null" ]]; then
            FILE_VERSION=$(tr -d '[:space:]' < VERSION)
            if [[ "$FILE_VERSION" != "$CARGO_VERSION" ]]; then
              echo "::error::VERSION file ($FILE_VERSION) does not match Cargo.toml workspace version ($CARGO_VERSION)"
              echo "version_sync_ok=false" >> "$GITHUB_OUTPUT"
            else
              echo "version_sync_ok=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "version_sync_ok=true" >> "$GITHUB_OUTPUT"
          fi

          # Count unreleased changes
          if [[ "$LATEST_TAG" != "none" ]]; then
            TOTAL=$(git rev-list --count "${LATEST_TAG}..HEAD" 2>/dev/null || echo 0)
            FEATS=$(git log "${LATEST_TAG}..HEAD" --oneline --grep="^feat" 2>/dev/null | wc -l)
            FIXES=$(git log "${LATEST_TAG}..HEAD" --oneline --grep="^fix" 2>/dev/null | wc -l)
          else
            TOTAL=0
            FEATS=0
            FIXES=0
          fi

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "feats=$FEATS" >> "$GITHUB_OUTPUT"
          echo "fixes=$FIXES" >> "$GITHUB_OUTPUT"

          # Check tag matches version
          if [[ "$LATEST_TAG" != "$EXPECTED_TAG" ]]; then
            echo "tag_drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_drift=false" >> "$GITHUB_OUTPUT"
          fi

          # Alert threshold: >5 feat/fix commits unreleased
          if [[ $((FEATS + FIXES)) -gt 5 ]]; then
            echo "needs_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update drift issue
        if: steps.check.outputs.needs_release == 'true' || steps.check.outputs.tag_drift == 'true' || steps.check.outputs.version_sync_ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="⚠️ Release drift: ${{ steps.check.outputs.total }} unreleased commits since ${{ steps.check.outputs.latest_tag }}"
          BODY="## Release Drift Detected

          | Metric | Value |
          |--------|-------|
          | VERSION file | \`${{ steps.check.outputs.version }}\` |
          | Cargo.toml version | \`${{ steps.check.outputs.version }}\` |
          | VERSION sync ok | ${{ steps.check.outputs.version_sync_ok }} |
          | Latest git tag | \`${{ steps.check.outputs.latest_tag }}\` |
          | Unreleased commits | ${{ steps.check.outputs.total }} |
          | Unreleased feat: | ${{ steps.check.outputs.feats }} |
          | Unreleased fix: | ${{ steps.check.outputs.fixes }} |
          | Tag drift | ${{ steps.check.outputs.tag_drift }} |

          ### Action Required
          Run \`./scripts/release-manager.sh validate\` to check release readiness.

          If ready to release:
          1. \`./scripts/verify-release-state.sh --check-tag --check-unreleased\`
          2. Bump version in **both** \`Cargo.toml\` and \`VERSION\` file (ADR-061)
          3. Update ROADMAP_ACTIVE.md and STATUS/CURRENT.md versions
          4. \`./scripts/release-manager.sh full --execute\`

          *This issue is auto-generated by the release-drift workflow.*"

          # Close existing drift issues
          gh issue list --label "release-drift" --state open --json number -q '.[].number' | while read -r num; do
            gh issue close "$num" --comment "Superseded by new drift check" 2>/dev/null || true
          done

          # Ensure the release-drift label exists (idempotent: succeeds if exists)
          gh label create release-drift --color "D93F0B" --description "Auto-generated release drift alerts" 2>/dev/null || true

          # Create new issue
          gh issue create --title "$TITLE" --body "$BODY" --label "release-drift"

      - name: Summary
        run: |
          echo "### Release State" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| VERSION file | \`${{ steps.check.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| VERSION sync ok | ${{ steps.check.outputs.version_sync_ok }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest tag | \`${{ steps.check.outputs.latest_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unreleased | ${{ steps.check.outputs.total }} commits (${{ steps.check.outputs.feats }} feat, ${{ steps.check.outputs.fixes }} fix) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag drift | ${{ steps.check.outputs.tag_drift }} |" >> "$GITHUB_STEP_SUMMARY"
