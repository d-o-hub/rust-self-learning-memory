---
name: Security

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

# Never cancel security scans in progress
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Wait for quick-check to pass before running security scans
  # This implements the "fast checks first" pattern for 2026 best practices
  check-quick-check:
    name: Check Quick Check Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Only run on PRs and never for Dependabot to avoid timeout issues
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    steps:
      - name: Wait for Quick Check with timeout protection
        uses: lewagon/wait-on-check-action@96d9100b431964d10e0136aff8b9ccb92470505e # v1.8.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Quick PR Check (Format + Clippy)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: Quick Check
          fail-on-no-checks: false

  secret-scan:
    name: Secret Scanning
    permissions:
      contents: read
      security-events: write  # Required for gitleaks-action SARIF uploads
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for premium features

  # Dependency Review requires GitHub Advanced Security (not available on this repo)
  # Commenting out to prevent workflow failures
  # dependency-review:
  #   name: Dependency Review
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #   if: github.event_name == 'pull_request'
  #   timeout-minutes: 10
  #   steps:
  #     - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
  #     - uses: actions/dependency-review-action@v4.8.2
  #       with:
  #         fail-on-severity: moderate

  supply-chain-audit:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: security-supply-chain-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

      - name: Upload audit report
        if: always()
        run: cargo audit --json > audit-report.json

      - name: Upload audit report artifact
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
