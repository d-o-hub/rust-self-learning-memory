---
name: Security

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

# Never cancel security scans in progress
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Wait for quick-check to pass before running security scans
  # This implements the "fast checks first" pattern for 2026 best practices
  check-quick-check:
    name: Check Quick Check Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Only run on PRs and never for Dependabot to avoid timeout issues
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    steps:
      - name: Wait for Quick Check with timeout protection
        uses: lewagon/wait-on-check-action@1d57e2c51a58d812d2765e036a028b6bdb5a6154 # v1.8.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Quick PR Check (Format + Clippy)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: Quick Check
          fail-on-no-checks: false
          allowed-conclusions: success,skipped,cancelled

  secret-scan:
    name: Secret Scanning
    permissions:
      contents: read
      security-events: write  # Required for gitleaks-action SARIF uploads
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for premium features

  # Dependency Review requires GitHub Advanced Security (not available on this repo)
  # Commenting out to prevent workflow failures
  # dependency-review:
  #   name: Dependency Review
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #   if: github.event_name == 'pull_request'
  #   timeout-minutes: 10
  #   steps:
  #     - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
  #     - uses: actions/dependency-review-action@v4.8.2
  #       with:
  #         fail-on-severity: moderate

  supply-chain-audit:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: security-supply-chain-audit

      - name: Install cargo-deny and cargo-audit
        run: |
          cargo install cargo-deny --locked
          cargo install cargo-audit --locked || true

      - name: Run cargo deny advisories (blocking)
        run: |
          set -euo pipefail
          # W2.2: authoritative advisory gate — never soft-pass.
          cargo deny check advisories

      - name: Run cargo audit (structured report)
        run: |
          set -euo pipefail
          set +e
          cargo audit --json > audit-report.json 2>audit-err.txt
          audit_rc=$?
          set -e
          if [ "$audit_rc" -eq 0 ] && [ -f audit-report.json ]; then
            count=$(jq -r '.vulnerabilities.count // 0' audit-report.json)
            echo "cargo audit vulnerabilities: ${count}"
            if [ "${count}" -gt 0 ]; then
              cat audit-report.json
              exit 1
            fi
          else
            echo "cargo audit tool/DB issue (rc=${audit_rc}); deny already enforced"
            cat audit-err.txt || true
            # Produce a minimal report so the artifact step still has a file.
            echo '{"vulnerabilities":{"count":0},"note":"cargo-audit unavailable; cargo-deny enforced"}' > audit-report.json
          fi

      - name: Upload audit report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30

      - name: Post audit summary
        if: always()
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "Authoritative gate: cargo deny check advisories (blocking)" >> $GITHUB_STEP_SUMMARY
          if [ -f audit-report.json ]; then
            echo "cargo-audit vulnerabilities count: $(cat audit-report.json | jq -r '.vulnerabilities.count // "n/a"')" >> $GITHUB_STEP_SUMMARY
          else
            echo "Audit report not found." >> $GITHUB_STEP_SUMMARY
          fi

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
