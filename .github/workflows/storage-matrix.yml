name: Storage Matrix Tests
permissions:
  contents: read

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  storage-matrix:
    name: Storage Matrix (${{ matrix.storage-mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        storage-mode: [redb-only, turso-only, hybrid]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          job-name: storage-matrix-${{ matrix.storage-mode }}

      - name: Run Storage Tests
        run: |
          case "${{ matrix.storage-mode }}" in
            "redb-only")
              cargo test --workspace --exclude do-memory-storage-turso --all-features
              ;;
            "turso-only")
              cargo test --workspace --exclude do-memory-storage-redb --all-features
              ;;
            "hybrid")
              cargo test --workspace --all-features
              ;;
          esac
        shell: bash
