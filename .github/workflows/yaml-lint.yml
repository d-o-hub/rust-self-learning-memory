---
name: YAML Lint

"on":
  push:
    branches: [main, develop]
    paths:
      - '**.yml'
      - '**.yaml'
      - '.github/workflows/**'
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - '**.yml'
      - '**.yaml'
      - '.github/workflows/**'

# Cancel outdated lint runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # YAML lint is cheap and path-filtered. Do NOT gate on Quick Check:
  # wait-on-check with timeout-minutes:15 routinely cancelled after ~15m while
  # Quick Check was still running (queue + cold cache ~15–20m), which skipped
  # yamllint/actionlint and left a permanent CANCELLED required-looking check.
  yamllint:
    name: YAML Syntax Validation
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Run yamllint (entire repo)
        run: |
          yamllint -c .yamllint.yml . || (echo "❌ YAML lint failed" && exit 1)

      - name: Validate GitHub Actions workflows
        run: |
          yamllint -d \
            "{extends: default, rules: {line-length: disable, indentation: {spaces: 2}}}" \
            .github/ || (echo "❌ GitHub Actions YAML lint failed" && exit 1)

  actionlint:
    name: GitHub Actions Workflow Validation
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d
        with:
          fail_level: error
          filter_mode: nofilter
          actionlint_flags: -shellcheck=
