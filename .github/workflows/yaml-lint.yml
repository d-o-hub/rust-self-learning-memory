---
name: YAML Lint

"on":
  push:
    branches: [main, develop]
    paths:
      - '**.yml'
      - '**.yaml'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.yml'
      - '**.yaml'
      - '.github/workflows/**'

# Cancel outdated lint runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Wait for quick-check to pass before running YAML lint
  # This implements the "fast checks first" pattern for 2026 best practices
  check-quick-check:
    name: Check Quick Check Status
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Only run on PRs and never for Dependabot to avoid timeout issues
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    steps:
      - name: Wait for Quick Check with timeout protection
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Quick PR Check (Format + Clippy)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: Quick Check

  yamllint:
    name: YAML Syntax Validation
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Run yamllint (entire repo)
        run: |
          yamllint -c .yamllint.yml . || (echo "❌ YAML lint failed" && exit 1)

      - name: Validate GitHub Actions workflows
        run: |
          yamllint -d \
            "{extends: default, rules: {line-length: disable, indentation: {spaces: 2}}}" \
            .github/ || (echo "❌ GitHub Actions YAML lint failed" && exit 1)

  actionlint:
    name: GitHub Actions Workflow Validation
    runs-on: ubuntu-latest
    needs: [check-quick-check]
    # Run if not Dependabot, and either not a PR or quick-check passed/skipped
    if: >-
      ${{
        always() &&
        github.actor != 'dependabot[bot]' &&
        (
          github.event_name != 'pull_request' ||
          needs.check-quick-check.result == 'success'
        )
      }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run actionlint
        uses: reviewdog/action-actionlint@be0761e4c1bab7cfdfca56cd03d4bb6253e39a4a
        with:
          fail_level: error
          filter_mode: nofilter
          actionlint_flags: -shellcheck=
