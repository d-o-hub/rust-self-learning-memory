# Pre-commit hooks for CI parity
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      # Format check - matches CI 'cargo fmt --all -- --check'
      - id: fmt
        name: Format (cargo fmt)
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false

      # Clippy on lib + tests - matches CI quick-check.yml
      - id: clippy-lib
        name: Clippy (lib)
        entry: cargo clippy --lib -- -D warnings -A clippy::expect_used -A clippy::uninlined_format_args -A clippy::unwrap_used
        language: system
        pass_filenames: false

      - id: clippy-tests
        name: Clippy (tests)
        entry: cargo clippy --tests -- -D warnings -A clippy::expect_used -A clippy::uninlined_format_args -A clippy::unwrap_used
        language: system
        pass_filenames: false

  # Optional: Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict