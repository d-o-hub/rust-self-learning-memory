# Codecov configuration for rust-self-learning-memory
# See https://docs.codecov.com/docs/codecov-yml

coverage:
  # Project-wide coverage threshold
  status:
    project:
      default:
        target: 80%          # Overall project coverage target
        threshold: 5%        # Allow 5% drop without failing
        if_ci_failed: error  # Fail if CI failed
        only_pulls: false    # Run on all branches
    patch:
      default:
        target: 50%          # New code needs at least 50% coverage
        threshold: 10%       # Allow 10% leeway
        informational: true  # Don't block PRs, just inform
        only_pulls: true     # Only run on pull requests

  # Carry forward coverage for consistent tracking
  carryforward: true

# Ignore patterns
ignore:
  - "**/tests/**"           # Test files
  - "**/*_test.rs"          # Test modules
  - "**/benches/**"         # Benchmark code
  - "**/examples/**"        # Example code
  - "**/test-utils/**"      # Test utilities
  - "**/*.generated.rs"     # Generated code

# PR comment configuration
comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: true     # Only comment if coverage changes

# GitHub checks
github_checks:
  annotations: false        # Don't add line annotations (noisy)