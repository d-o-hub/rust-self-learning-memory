# cargo-deny configuration for supply chain security
# https://embarkstudios.github.io/cargo-deny/

# Note: All fields are optional, this is the default configuration

[advisories]
# The advisories section is for detecting security vulnerabilities
# Use version 2 for new configuration format
version = 2
unmaintained = "workspace"  # Only error if crate is a direct dependency
yanked = "deny"
ignore = [
    # RUSTSEC-2026-0049: rustls-webpki CRL matching logic flaw
    # Dependency chain: libsql 0.9.30 -> hyper-rustls 0.25 -> rustls 0.22 -> rustls-webpki 0.102.8
    # Fix: rustls-webpki >=0.103.10 (semver-incompatible with rustls 0.22's ^0.102.8 constraint)
    # Upstream: Requires libsql to migrate from hyper-rustls 0.25 (hyper 0.14) to 0.27 (hyper 1.x)
    # Tracking: https://github.com/rustls/webpki/releases/tag/v/0.103.10
    # Mitigation: CRL matching flaw is low impact; CRL validation not relied upon in our usage
    "RUSTSEC-2026-0049",
    # RUSTSEC-2026-0099: rustls-webpki name constraints for wildcard names incorrectly accepted
    # Dependency chain: libsql 0.9.30 -> hyper-rustls 0.25 -> rustls 0.22 -> rustls-webpki 0.102.8
    # Fix: rustls-webpki >=0.103.12 OR >=0.104.0-alpha.6 (semver-incompatible)
    # Date: 2026-04-14
    # Mitigation: Transitive dependency, awaiting libsql upstream update
    "RUSTSEC-2026-0099",
    # RUSTSEC-2026-0098: rustls-webpki name constraints for URI names incorrectly accepted
    # Same dependency chain and fix as RUSTSEC-2026-0099
    # Date: 2026-04-14
    "RUSTSEC-2026-0098",
    # RUSTSEC-2026-0104: rustls-webpki reachable panic in CRL parsing
    # Dependency chain: libsql 0.9.30 -> hyper-rustls 0.25 -> rustls 0.22 -> rustls-webpki 0.102.8
    # Fix: rustls-webpki >=0.103.13 OR >=0.104.0-alpha.7 (semver-incompatible)
    # Date: 2026-04-22
    # Mitigation: Applications that do not use CRLs are not affected
    "RUSTSEC-2026-0104",
    # RUSTSEC-2026-0097: rand is unsound with a custom logger using rand::rng()
    # Dependency chain: multiple (tokio, libsql, etc) -> rand 0.8/0.9
    # Fix: rand >=0.8.6 (semver-compatible with 0.8.x) or >=0.9.x
    # Upstream: Waiting for transitive dependency updates
    # Mitigation: Unsoundness only affects custom loggers using rand::rng()
    "RUSTSEC-2026-0097",
    # RUSTSEC-2025-0141: bincode is unmaintained
    # Dependency chain: libsql 0.9.30 -> bincode 1.3.3
    # Mitigation: Awaiting libsql update, bincode usage in libsql is for internal state
    "RUSTSEC-2025-0141",
    # RUSTSEC-2024-0384: instant is unmaintained
    # Dependency chain: augurs-changepoint 0.10.2 -> ... -> instant 0.1.13
    # Mitigation: Awaiting augurs updates
    "RUSTSEC-2024-0384",
    # RUSTSEC-2024-0436: paste is unmaintained
    # Dependency chain: tokenizers 0.22.2 -> paste 1.0.15
    # Mitigation: Awaiting tokenizers updates
    "RUSTSEC-2024-0436",
    # RUSTSEC-2025-0134: rustls-pemfile 2.2.0 is unmaintained
    "RUSTSEC-2025-0134",
    # RUSTSEC-2026-0002: lru has unsound IterMut implementation
    "RUSTSEC-2026-0002",
]

[licenses]
# The licenses section is for detecting incompatible licenses
# Use version 2 for new configuration format
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "MPL-2.0",
]
exceptions = [
    { name = "colored", allow = ["MPL-2.0"] },
    { name = "option-ext", allow = ["MPL-2.0"] },
    { name = "bitmaps", allow = ["MPL-2.0"] },
    { name = "im-rc", allow = ["MPL-2.0"] },
    { name = "sized-chunks", allow = ["MPL-2.0"] },
]
# Note: In version 2, all licenses not in 'allow' list are automatically denied

[bans]
# The bans section is for detecting multiple versions of the same crate
multiple-versions = "allow"  # Changed from "warn" to "allow" temporarily
wildcards = "allow"  # Changed from "deny" to "allow" to be more permissive
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = [
    # Deny old unmaintained crates
    { name = "chrono", version = "<0.4" },
]
skip = [
    # Allow multiple versions of zerocopy (known issue with dependencies)
    { name = "zerocopy" },
]

[sources]
# The sources section is for detecting where dependencies come from
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
