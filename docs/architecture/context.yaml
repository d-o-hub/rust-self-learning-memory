    role: "Domain types, episodes, embeddings, patterns"
  - name: "memory-storage-turso"
    role: "Persistent storage backend (libSQL/Turso)"
  - name: "memory-storage-redb"
    role: "Local cache backend (redb + postcard)"
  - name: "memory-mcp"
    role: "MCP server, tool registry, sandbox"
  - name: "memory-cli"
    role: "CLI interface and config management"

workflow:
